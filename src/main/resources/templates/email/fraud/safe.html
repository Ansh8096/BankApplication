<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;background:#f4f6f8;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="20">
    <tr><td align="center">

        <table width="600" style="background:#ffffff;padding:30px;border-radius:12px">

            <tr>
                <td style="font-size:18px;font-weight:bold;color:#2c3e50;">
                    🏦 Bank of Ansh
                </td>
            </tr>

            <tr><td><hr style="border:none;border-top:1px solid #eee;margin:15px 0;"></td></tr>

            <tr>
                <td align="center">
                    <h2 style="margin:0;color:#27ae60;">✅ Transaction Successful</h2>
                </td>
            </tr>

            <tr><td><hr style="border:none;border-top:1px solid #eee;margin:20px 0;"></td></tr>

            <tr>
                <td style="color:#555;font-size:15px;line-height:1.6;">
                    Hello <span th:text="${name}">User</span>,
                    <br><br>
                    Your transaction was successfully processed and verified as safe.
                </td>
            </tr>

            <tr>
                <td>
                    <table width="100%" cellpadding="10"
                           style="background:#f3fbf6;border:1px solid #d4edda;border-radius:8px;font-size:14px;margin-top:15px;">

                        <tr>
                            <td><b>Account Number:</b></td>
                            <td th:text="${accountNumber}"></td>
                        </tr>

                        <tr>
                            <td><b>Amount:</b></td>
                            <td th:text="${amount}"></td>
                        </tr>

                        <tr>
                            <td><b>Transaction Type:</b></td>
                            <td th:text="${transactionType}"></td>
                        </tr>

                        <tr>
                            <td><b>Time:</b></td>
                            <td th:text="${time}"></td>
                        </tr>

                        <tr>
                            <td><strong>Status:</strong></td>
                            <td>
                                <span style="color:#27ae60;font-weight:bold;background:#eafaf1;
                                padding:4px 8px;border-radius:4px;">
                                Safe
                                </span>
                            </td>
                        </tr>

                    </table>
                </td>
            </tr>

            <tr>
                <td style="padding-top:20px;color:#555;">
                    No action is required from your side.
                </td>
            </tr>

            <tr>
                <td style="text-align:center;font-size:13px;color:#777;padding-top:15px;">
                    Need help?
                    <a href="mailto:support@bankofansh.com" style="color:#3498db;text-decoration:none;">
                        support@bankofansh.com
                    </a>
                </td>
            </tr>

            <tr>
                <td style="text-align:center;font-size:12px;color:#aaa;padding-top:20px;">
                    © 2026 Bank of Ansh. All rights reserved.
                </td>
            </tr>

        </table>
    </td></tr>
</table>

</body>
</html>
